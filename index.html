<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Star Forge</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-shell">
        <canvas id="game"></canvas>

        <div id="ui-root">
            <div id="hud">
                <div class="hud-row"><span>⭐ Stardust</span><b id="hud-dust">0</b></div>
                <div class="hud-row"><span>⚡ Power</span><b id="hud-power">1.0</b></div>
                <div class="hud-row"><span>☀ Level</span><b id="hud-level">1</b></div>
                <div class="hud-row"><span>🎯 Combo</span><b id="hud-combo">0</b></div>
                <div class="hud-row"><span>🛰 Satellites</span><b id="hud-sats">0</b></div>
                <div class="hud-small">Click the cyan flare for bonus yield.</div>
            </div>

            <div id="panels">
                <button id="btn-build-sat" class="action-btn">Build Satellite (50)</button>
                <button id="btn-build-drone" class="action-btn">Build Drone (150)</button>
                <button id="btn-upgrade-click" class="action-btn">Upgrade Click Power (75)</button>
            </div>

            <div id="notifications"></div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
