<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Star Forge</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #02040c; font-family: system-ui, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; left: 16px; top: 16px; z-index: 10; color: #fff;
    background: rgba(0,0,0,.35); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px; padding: 12px 14px; min-width: 200px;
  }
  #hud .row { display: flex; justify-content: space-between; gap: 16px; font-size: 14px; line-height: 1.5; }
  #hud b { color: #ffd86b; }
  #hud .small { opacity: .7; font-size: 12px; margin-top: 8px; }
  button {
    margin-top: 10px; width: 100%; padding: 8px 10px; border-radius: 10px; border: 0; cursor: pointer;
    background: #28305f; color: #fff; font-weight: 600;
  }
</style>
</head>
<body>
<div id="hud">
  <div class="row"><span>⭐ Stardust</span><b id="dust">0</b></div>
  <div class="row"><span>⚡ Power</span><b id="power">1.0</b></div>
  <div class="row"><span>☀ Level</span><b id="level">1</b></div>
  <div class="row"><span>🎯 Combo</span><b id="combo">0</b></div>
  <div class="small">Click the cyan flare for bonus yield.</div>
  <button id="buildSat">Build Satellite (50)</button>
</div>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const dustEl = document.getElementById('dust');
  const powerEl = document.getElementById('power');
  const levelEl = document.getElementById('level');
  const comboEl = document.getElementById('combo');
  const buildBtn = document.getElementById('buildSat');

  const state = {
    dust: 0,
    power: 1,
    level: 1,
    combo: 0,
    shake: 0,
    pulse: 0,
    flare: 0,
    last: 0,
    satellites: [],
    particles: [],
    stars: []
  };

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < 260; i++) {
    state.stars.push({ x: Math.random(), y: Math.random(), s: Math.random() * 2 + 0.4, p: Math.random() * Math.PI * 2 });
  }

  function levelRequirement(lvl) {
    return 50 * Math.pow(lvl, 1.7);
  }

  function getLevel(totalDust) {
    let lvl = 1;
    while (totalDust >= levelRequirement(lvl)) lvl++;
    return lvl;
  }

  function getClickValue() {
    return (1 + state.level * 0.35) * (1 + state.combo * 0.15);
  }

  function buildSatellite() {
    if (state.dust < 50) return;
    state.dust -= 50;
    state.satellites.push({ angle: Math.random() * Math.PI * 2, radius: 135 + Math.random() * 50, speed: 0.35 + Math.random() * 0.2 });
  }

  buildBtn.addEventListener('click', buildSatellite);

  canvas.addEventListener('pointerdown', (e) => {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const r = Math.hypot(dx, dy);
    if (r > 95) return;

    let ang = Math.atan2(dy, dx);
    if (ang < 0) ang += Math.PI * 2;
    const good = ang > state.flare && ang < state.flare + 0.55;
    state.combo = good ? state.combo + 1 : 0;
    const gain = getClickValue() * (good ? 5 : 1);
    state.dust += gain;
    state.pulse = 0.4;
    state.shake = 8;

    for (let i = 0; i < 32; i++) {
      state.particles.push({
        x: e.clientX,
        y: e.clientY,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        life: 1,
        hue: 30 + Math.random() * 30
      });
    }
  });

  function drawStarfield(t) {
    for (const s of state.stars) {
      const x = (s.x * canvas.width + t * 0.01 * s.s * 20) % canvas.width;
      const y = s.y * canvas.height;
      ctx.fillStyle = `rgba(255,255,255,${0.2 + 0.5 * Math.sin(t * 0.001 + s.p)})`;
      ctx.fillRect(x, y, s.s, s.s);
    }
  }

  function drawStar(t) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const baseR = 84 + Math.sin(t * 0.004) * 2 + state.pulse * 8;

    ctx.save();
    ctx.translate(cx, cy);

    // corona bloom
    for (let i = 7; i >= 1; i--) {
      const r = 85 + i * 18 + Math.sin(t * 0.001 + i) * 4;
      const g = ctx.createRadialGradient(0, 0, 18, 0, 0, r);
      g.addColorStop(0, `rgba(255,220,120,${0.05 * i})`);
      g.addColorStop(1, 'rgba(255,120,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // hotspot / flare
    ctx.strokeStyle = '#8ff';
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.arc(0, 0, 98, state.flare, state.flare + 0.55);
    ctx.stroke();

    // core
    const grad = ctx.createRadialGradient(-20, -25, 6, 0, 0, 95);
    grad.addColorStop(0, '#fffde6');
    grad.addColorStop(0.45, '#ffbe54');
    grad.addColorStop(1, '#c83b00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, baseR, 0, Math.PI * 2);
    ctx.fill();

    // convection cells
    for (let i = 0; i < 38; i++) {
      const a = i * 0.33 + t * 0.0003;
      const rr = 22 + Math.sin(i + t * 0.0008) * 38;
      const x = Math.cos(a) * rr;
      const y = Math.sin(a * 1.2) * rr * 0.7;
      const rad = 4 + 4 * Math.sin(i * 2 + t * 0.002);
      ctx.fillStyle = `rgba(255, ${160 + 40 * Math.sin(i)}, 40, 0.12)`;
      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI * 2);
      ctx.fill();
    }

    // sunspots
    for (let i = 0; i < 5; i++) {
      const a = i * 1.3 + t * 0.0001;
      const rr = 42 + 10 * Math.sin(i * 2);
      ctx.fillStyle = 'rgba(35, 15, 10, 0.42)';
      ctx.beginPath();
      ctx.arc(Math.cos(a) * rr, Math.sin(a * 1.2) * rr * 0.7, 8 + 2 * Math.sin(t * 0.002 + i), 0, Math.PI * 2);
      ctx.fill();
    }

    // plasma rivers
    for (let j = 0; j < 7; j++) {
      ctx.strokeStyle = 'rgba(255,220,120,0.14)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let k = 0; k < 50; k++) {
        const u = k / 49 * Math.PI * 2;
        const rr = 55 + Math.sin(u * 6 + t * 0.001 + j) * 8;
        const x = Math.cos(u + j) * rr;
        const y = Math.sin(u + j) * rr;
        if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // satellites
    for (const sat of state.satellites) {
      sat.angle += sat.speed * 0.01;
      const sx = Math.cos(sat.angle) * sat.radius;
      const sy = Math.sin(sat.angle) * sat.radius * 0.65;
      ctx.strokeStyle = 'rgba(120,160,255,0.15)';
      ctx.beginPath();
      ctx.arc(0, 0, sat.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#7cf';
      ctx.fillRect(sx - 4, sy - 4, 8, 8);
      ctx.strokeStyle = '#9ef';
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx * 0.8, sy * 0.8);
      ctx.stroke();
    }

    ctx.restore();
  }

  function loop(t) {
    requestAnimationFrame(loop);
    const dt = Math.min((t - state.last) / 1000 || 0, 0.05);
    state.last = t;
    state.flare = (state.flare + dt * 0.8) % (Math.PI * 2);
    state.level = getLevel(state.dust);
    state.power = 1 + state.level * 0.35 + state.satellites.length * 0.2;
    state.dust += state.satellites.length * dt * 0.8 * state.power;
    state.pulse *= 0.92;
    state.shake *= 0.9;

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#02040c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (state.shake > 0.05) {
      ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
    }

    drawStarfield(t);
    drawStar(t);

    state.particles = state.particles.filter(p => p.life > 0);
    for (const p of state.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.025;
      ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.life})`;
      ctx.fillRect(p.x, p.y, 3, 3);
    }

    dustEl.textContent = Math.floor(state.dust);
    powerEl.textContent = state.power.toFixed(1);
    levelEl.textContent = state.level;
    comboEl.textContent = state.combo;
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
